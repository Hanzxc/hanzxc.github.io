<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="color-scheme" content="dark light">
  <title>Page not found | Jun Han</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.setAttribute("data-theme", saved || (prefersLight ? "light" : "dark"));
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <main class="error-wrap">
    <p class="glitch">404</p>
    <p class="eyebrow" style="justify-content:center;">Loose cable detected</p>
    <h1 style="font-size:clamp(1.8rem,5vw,3rem);">This page doesn't exist.</h1>
    <p class="lead" style="margin:0 auto 1.6rem;">
      The route you requested isn't on the rack. Head back to the portfolio home and we'll
      pretend this never happened.
    </p>
    <a class="button primary" href="index.html">Back home</a>
  </main>
</body>
</html>
